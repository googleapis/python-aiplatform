# Format: //devtools/kokoro/config/proto/build.proto

# Run fast linting and code formatting checks
env_vars: {
    key: "NOX_SESSION"
    value: "lint lint_setup_py blacken"
}

# Run unit tests in parallel, splitting up by file
env_vars: {
    key: "PYTEST_ADDOPTS"
    value: "-n=auto --dist=loadscope"
}
